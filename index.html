<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>ياسمين 🤍</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b141a;
  color:white;
}

.header {
  background:#202c33;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

#chat {
  height:75vh;
  overflow:auto;
  padding:10px;
}

.msg {
  margin:8px;
  padding:10px;
  border-radius:10px;
  max-width:70%;
}

.y { background:#202c33; text-align:right; }
.u { background:#005c4b; margin-left:auto; }

.inputBox {
  display:flex;
  padding:10px;
  background:#202c33;
}

input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:20px;
}

button {
  margin-left:5px;
  padding:10px;
  border:none;
  border-radius:50%;
  background:#00a884;
  color:white;
}
</style>
</head>

<body>

<div class="header">🤍 ياسمين</div>

<div id="chat"></div>

<div class="inputBox">
  <input id="input" placeholder="اكتب..." />
  <button onclick="send()">➤</button>
</div>

<script>
const chat = document.getElementById("chat");

function add(text,type){
  let d=document.createElement("div");
  d.className="msg "+type;
  d.innerText=text;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

function speak(text){
  let u=new SpeechSynthesisUtterance(text);
  u.lang="ar-SA";
  speechSynthesis.speak(u);
}

async function send(){
  let input=document.getElementById("input");
  let text=input.value;
  if(!text) return;

  add(text,"u");
  add("لحظة أفكر 🤍...","y");

  let res=await fetch("/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:text})
  });

  let data=await res.json();

  chat.lastChild.innerText=data.reply;
  speak(data.reply);

  input.value="";
}

window.onload=()=>{
  add("شلونك اليوم؟ 🤍","y");
};
</script>

</body>
</html>
